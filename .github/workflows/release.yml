name: Build & Release

on:
push:
tags:
- "v*"

jobs:
build:
strategy:
matrix:
include:
- os: ubuntu-latest
target: x86_64-unknown-linux-gnu
name: linux-x86_64
ext: ""
archive: tar.gz

```
      - os: windows-latest
        target: x86_64-pc-windows-gnu
        name: windows-x86_64
        ext: ".exe"
        archive: zip

      - os: macos-latest
        target: x86_64-apple-darwin
        name: macos-x86_64
        ext: ""
        archive: tar.gz

runs-on: ${{ matrix.os }}

steps:
  - uses: actions/checkout@v4

  - uses: dtolnay/rust-toolchain@stable
    with:
      targets: ${{ matrix.target }}

  - name: Build
    run: cargo build --release --target ${{ matrix.target }}

  - name: Package (Linux/macOS)
    if: matrix.archive == 'tar.gz'
    run: |
      mkdir dist
      cp target/${{ matrix.target }}/release/csvlive${{ matrix.ext }} dist/
      tar -czvf csvlive-${{ matrix.name }}.tar.gz -C dist csvlive${{ matrix.ext }}

  - name: Package (Windows)
    if: matrix.archive == 'zip'
    run: |
      mkdir dist
      cp target/${{ matrix.target }}/release/csvlive.exe dist/
      powershell Compress-Archive -Path dist/csvlive.exe -DestinationPath csvlive-${{ matrix.name }}.zip

  - name: Upload Release
    uses: softprops/action-gh-release@v1
    with:
      files: |
        *.tar.gz
        *.zip
```
